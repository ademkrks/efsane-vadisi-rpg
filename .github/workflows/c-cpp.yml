name: C/C++ CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v4

    - name: Bağımlılıkları Kur ve Derle
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential
        g++ -std=c++17 main.cpp -o oyun
